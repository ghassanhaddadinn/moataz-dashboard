name: Refresh Moataz Dashboard

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tzdata

      - name: Generate dashboard
        env:
          ODOO_URL: https://nestu.odoo.com
          ODOO_DB: odooerp-ae-nestu-health-main-12720997
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python moataz_dashboard.py

      - name: Commit and push dashboard.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          git commit -m "Dashboard refresh $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push --force origin main
